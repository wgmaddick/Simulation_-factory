[theme]
base = "dark"
primaryColor = "#10b981"
backgroundColor = "#0c1017"
secondaryBackgroundColor = "#161b22"
textColor = "#f8fafc"
font = "sans serif"

[server]
headless = true
# PR #24 — Streamlit form / websocket CSRF + CORS guards; bound intake sizes.
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 5
maxMessageSize = 50

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
