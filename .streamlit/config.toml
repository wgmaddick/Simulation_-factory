[theme]
base = "dark"
primaryColor = "#00E676"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EDF3"
font = "sans serif"

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 5
maxMessageSize = 50

[browser]
gatherUsageStats = false
